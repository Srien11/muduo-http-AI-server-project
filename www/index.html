<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知墨</title>
<style>
:root {
  --bg: #f7f8fa;
  --bg-side: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #f0f2f6;
  --bg-active: #eef0ff;
  --border: #e4e7ee;
  --text: #1a1d2e;
  --text-soft: #5a6075;
  --text-muted: #949ab0;
  --accent: #6366f1;
  --accent-light: #eef0ff;
  --shadow: 0 1px 3px rgba(0,0,0,.04);
  --radius: 10px;
  --radius-sm: 7px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}
.sidebar{width:260px;background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-head{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.sidebar-head h1{font-size:15px;font-weight:700;}
.sidebar-head button{background:var(--accent);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;}
.sidebar-search{padding:0 12px 8px;}
.sidebar-search input{width:100%;background:var(--bg);border:1px solid transparent;border-radius:var(--radius-sm);padding:7px 10px;font-size:12px;color:var(--text);outline:none;}
.history-list{flex:1;overflow-y:auto;padding:0 8px;}
.history-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-soft);display:flex;align-items:center;gap:8px;}
.history-item:hover{background:var(--bg-hover);}
.history-item.active{background:var(--bg-active);color:var(--accent);font-weight:500;}
.history-item .del{margin-left:auto;opacity:0;width:20px;height:20px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:4px;font-size:13px;}
.history-item:hover .del{opacity:1;}
.history-item .preview{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.sidebar-foot{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-foot .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
.sidebar-foot .status .dot{width:6px;height:6px;border-radius:50%;background:#10b981;}
.sidebar-foot .setting-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chat-header .title{font-size:14px;font-weight:600;}
.chat-header .model-badge{font-size:11px;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:6px;font-weight:500;}
.prov-sel{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 6px;color:var(--text-soft);outline:none;cursor:pointer;}
.chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:10px;max-width:85%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.msg.bot .msg-av{background:var(--accent-light);color:var(--accent);}
.msg.user .msg-av{background:var(--accent);color:#fff;}
.msg-bub{padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.msg.bot .msg-bub{background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);}
.msg.user .msg-bub{background:var(--accent);color:#fff;}
.rzn-toggle{font-size:11px;color:var(--text-muted);cursor:pointer;margin-top:6px;user-select:none;}
.rzn-toggle:hover{color:var(--accent);}
.rzn-body{font-size:12px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;margin-top:4px;display:none;white-space:pre-wrap;line-height:1.5;}
.rzn-body.open{display:block;}
.msg-foot{font-size:10px;color:var(--text-muted);margin-top:4px;opacity:.7;}
.chat-in{padding:16px 24px;border-top:1px solid var(--border);background:var(--bg);}
.chat-in .row{display:flex;gap:8px;max-width:900px;margin:0 auto;}
.chat-in input{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px;font-size:14px;color:var(--text);outline:none;box-shadow:var(--shadow);}
.chat-in input:focus{border-color:var(--accent);}
.chat-in button{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chat-in .hint{font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:14px;width:460px;max-width:90vw;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.12);}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal .field{margin-bottom:16px;}
.modal label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal .actions button{padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;}
.modal .actions .pri{background:var(--accent);color:#fff;}
.modal .actions .sec{background:var(--bg);color:var(--text-soft);border:1px solid var(--border);}
.modal .tip{font-size:11px;color:var(--text-muted);margin-top:4px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#d0d5e0;border-radius:2px;}
</style>
</head>
<body>
<aside class="sidebar" id="side">
  <div class="sidebar-head">
    <h1>知墨</h1>
    <button onclick="newChat()">+</button>
  </div>
  <div class="sidebar-search"><input id="searchHist" placeholder="搜索..." oninput="filterHistory()"></div>
  <div class="history-list" id="histList"><div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无历史对话</div></div>
  <div class="sidebar-foot">
    <div class="status"><div class="dot"></div><span id="connStatus">已连接</span></div>
    <button class="setting-btn" onclick="openSettings()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="setting-btn" onclick="logout()" title="退出登录" style="margin-left:4px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>
<div class="main">
  <div class="chat-header">
    <span class="title" id="chatTitle">新对话</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="provSel" class="prov-sel" onchange="switchProvider(this.value)"></select>
      <span class="model-badge" id="modelBadge">-</span>
    </div>
  </div>
  <div class="chat-msgs" id="chatLog">
    <div style="text-align:center;padding:40px 20px;color:var(--text-muted);">
      <div style="font-size:40px;margin-bottom:12px;opacity:.3">...</div>
      <div style="font-size:15px;font-weight:500;">开始新对话</div>
      <div style="font-size:13px;margin-top:4px;">消息会自动保存</div>
    </div>
  </div>
  <div class="chat-in">
    <div class="row">
      <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
      <button id="sendBtn" onclick="sendMsg()" style="width:42px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint" id="keyHint">未配置</div>
    <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:4px;" id="statsBar"></div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>设置</h2>
    <div class="field">
      <label>模型</label>
      <select id="sModel" onchange="saveSettings()">
        <option value="deepseek-v4-flash">deepseek-v4-flash</option>
        <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        <option value="deepseek-chat">deepseek-chat</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
      </select>
    </div>
    <div class="field">
      <label>API 地址</label>
      <input id="sApiBase" placeholder="https://api.deepseek.com/v1">
    </div>
    <div class="field">
      <label>API Key</label>
      <input id="sApiKey" type="password" placeholder="sk-...">
    </div>
    <div class="field"><label>工作目录</label><input id="sWorkspace" placeholder="."></div>
    <div class="actions">
      <button class="sec" onclick="closeSettings()">关闭</button>
      <button class="pri" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Login / Register overlay -->
<div class="modal-overlay" id="authOverlay">
  <div class="modal" style="width:400px;padding:24px 28px 20px;">
    <!-- Tab bar -->
    <div style="display:flex;margin-bottom:20px;border-bottom:2px solid var(--border);">
      <button id="aTabLogin" onclick="switchAuthTab('login')" style="flex:1;border:none;background:none;padding:10px;font-size:16px;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px;cursor:pointer;">登录</button>
      <button id="aTabRegister" onclick="switchAuthTab('register')" style="flex:1;border:none;background:none;padding:10px;font-size:16px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;">注册</button>
    </div>

    <div class="field"><label>手机号</label><input id="aPhone" type="tel" placeholder="输入手机号"></div>

    <!-- Registration fields -->
    <div id="aRegFields" style="display:none;">
      <div class="field">
        <label>验证码</label>
        <div style="display:flex;gap:8px;">
          <input id="aCode" type="text" placeholder="6位验证码" style="flex:1;">
          <button class="sec" id="aSendCode" onclick="sendCode()" style="white-space:nowrap;font-size:12px;">获取验证码</button>
        </div>
      </div>
    </div>

    <div class="field"><label>密码</label><input id="aPassword" type="password" placeholder="设置密码（至少6位）"></div>
    <div id="aError" style="display:none;color:#ef4444;font-size:12px;margin-bottom:12px;text-align:center;"></div>

    <div class="actions" style="justify-content:center;">
      <button class="pri" id="aSubmit" onclick="submitAuth()" style="width:100%;padding:12px;font-size:15px;">登录</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:12px;">
      API Key 由各用户自己配置，数据隔离存储
    </div>
  </div>
</div>

<script>
var authToken = localStorage.getItem('zhimo_token');
var authPhone = '';
var authMode = 'login';
var curSession = localStorage.getItem('zhimo_session') || 's_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
var isLoading = false;
var curProvider = localStorage.getItem('zhimo_provider') || 'deepseek';

// Auth helpers
function authHeaders() {
  var h = {'Content-Type':'application/json'};
  if (authToken) h['Authorization'] = 'Bearer '+authToken;
  return h;
}

async function authFetch(url, opts) {
  if (!opts) opts = {};
  if (!opts.headers) opts.headers = authHeaders();
  else Object.assign(opts.headers, authHeaders());
  return fetch(url, opts);
}

function switchAuthTab(mode) {
  authMode = mode;
  var tabL = document.getElementById('aTabLogin');
  var tabR = document.getElementById('aTabRegister');
  var regFields = document.getElementById('aRegFields');
  var submitBtn = document.getElementById('aSubmit');
  var errorEl = document.getElementById('aError');
  errorEl.style.display = 'none';
  if (mode === 'login') {
    tabL.style.color = 'var(--accent)'; tabL.style.fontWeight = '700';
    tabL.style.borderBottomColor = 'var(--accent)';
    tabR.style.color = 'var(--text-muted)'; tabR.style.fontWeight = '500';
    tabR.style.borderBottomColor = 'transparent';
    regFields.style.display = 'none';
    submitBtn.textContent = '登录';
  } else {
    tabR.style.color = 'var(--accent)'; tabR.style.fontWeight = '700';
    tabR.style.borderBottomColor = 'var(--accent)';
    tabL.style.color = 'var(--text-muted)'; tabL.style.fontWeight = '500';
    tabL.style.borderBottomColor = 'transparent';
    regFields.style.display = 'block';
    submitBtn.textContent = '注册';
  }
}

function showAuthError(msg) {
  var el = document.getElementById('aError');
  el.textContent = msg; el.style.display = 'block';
}

async function sendCode() {
  var phone = document.getElementById('aPhone').value.trim();
  if (!phone || phone.length < 11) { showAuthError('请输入正确的手机号'); return; }
  var btn = document.getElementById('aSendCode');
  btn.disabled = true;
  try {
    var d = await (await fetch('/api/sms/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone})})).json();
    if (d.error) { showAuthError(d.error); btn.disabled = false; return; }
    var sec = 60;
    btn.textContent = sec+'s';
    var timer = setInterval(function(){ sec--; btn.textContent = sec+'s'; if(sec<=0){ clearInterval(timer); btn.textContent='获取验证码'; btn.disabled=false; } }, 1000);
  } catch(e) { showAuthError('发送失败'); btn.disabled = false; }
}

async function submitAuth() {
  var phone = document.getElementById('aPhone').value.trim();
  var code = document.getElementById('aCode').value.trim();
  var password = document.getElementById('aPassword').value.trim();
  if (!phone || phone.length < 11) { showAuthError('请输入正确的手机号'); return; }
  if (!password || password.length < 6) { showAuthError('密码至少6位'); return; }
  if (authMode === 'register' && (!code || code.length !== 6)) { showAuthError('请输入6位验证码'); return; }

  var url = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
  var body = {phone:phone, password:password};
  if (authMode === 'register') body.code = code;

  try {
    var d = await (await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    if (d.token) {
      authToken = d.token;
      localStorage.setItem('zhimo_token', authToken);
      document.getElementById('authOverlay').classList.remove('show');
      initApp();
    } else {
      showAuthError(d.error || '操作失败');
    }
  } catch(e) { showAuthError('网络错误'); }
}

function logout() {
  authToken = null;
  localStorage.removeItem('zhimo_token');
  document.getElementById('authOverlay').classList.add('show');
  document.getElementById('chatLog').innerHTML = '';
}

// Check auth on load
if (!authToken) {
  document.getElementById('authOverlay').classList.add('show');
}

async function loadConfig() {
  try {
    var d = authToken ? await (await authFetch('/api/user/config')).json() : await (await fetch('/api/config')).json();
    document.getElementById('sApiKey').value = d.api_key || '';
    document.getElementById('sModel').value = d.model || 'deepseek-v4-flash';
    document.getElementById('sApiBase').value = d.api_base || 'https://api.deepseek.com/v1';
    document.getElementById('sWorkspace').value = d.workspace || '.';
    document.getElementById('modelBadge').textContent = d.model || '?';
    document.getElementById('keyHint').textContent = d.api_key ? '已配置' : '未配置 API Key';
  } catch(e) {}
}

function initApp() { loadConfig(); loadSessions(); loadStats(); loadProviders(); if (localStorage.getItem('zhimo_session')) loadSession(localStorage.getItem('zhimo_session')); }

async function loadStats() {
  try {
    var s = await (await fetch('/api/stats')).json();
    document.getElementById('statUptime').textContent = (s.uptime_seconds||0)+'s';
    document.getElementById('statReqs').textContent = s.requests||0;
    document.getElementById('statConns').textContent = s.active_connections||0;
    document.getElementById('statResp').textContent = (s.avg_response_ms||0).toFixed(1)+'ms';
    try { var r = await (await fetch('/rag/stats')).json(); document.getElementById('statRag').textContent = (r.chunks||0)+' 块'; } catch(e){}
    var bar = document.getElementById('statsBar');
    if (s.uptime_seconds) bar.textContent = Math.floor(s.uptime_seconds/60)+'m '+(s.requests||0)+' 请求 '+(s.active_connections||0)+' 连接';
  } catch(e) {}
}

async function loadSessions() {
  try {
    var list = await (await(authToken ? authFetch('/api/sessions') : fetch('/api/sessions'))).json();
    var el = document.getElementById('histList');
    if (!list.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无历史对话</div>'; return; }
    el.innerHTML = '';
    list.forEach(function(s){
      var d = document.createElement('div');
      d.className = 'history-item' + (curSession === s.id ? ' active' : '');
      d.innerHTML = '<span class="preview">'+esc(s.preview || s.id.slice(0,10))+'</span><button class="del" onclick="event.stopPropagation();delSession(\''+s.id+'\')">x</button>';
      d.onclick = function(){loadSession(s.id);};
      el.appendChild(d);
    });
  } catch(e) {}
}

async function loadProviders() {
  try {
    var list = await (await fetch('/api/providers')).json();
    var sel = document.getElementById('provSel');
    sel.innerHTML = '';
    list.forEach(function(p){
      var opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + ' (' + p.model + ')';
      sel.appendChild(opt);
    });
    sel.value = curProvider;
  } catch(e) {}
}

function switchProvider(name) { curProvider = name; localStorage.setItem('zhimo_provider', name); }

async function saveSettings() {
  try {
    var url = authToken ? '/api/user/config' : '/api/config';
    var opts = {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      api_key: document.getElementById('sApiKey').value,
      model: document.getElementById('sModel').value,
      api_base: document.getElementById('sApiBase').value,
      workspace: document.getElementById('sWorkspace').value
    })};
    if (authToken) { var r = await authFetch(url, opts); } else { var r = await fetch(url, opts); }
    loadConfig(); closeSettings();
  } catch(e) { alert('保存失败'); }
}

function openSettings(){document.getElementById('settingsModal').classList.add('show');loadStats();}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}

function toggleRzn(el) {
  var body = el.nextElementSibling;
  if (body && body.className.indexOf('rzn-body')>=0) {
    body.classList.toggle('open');
    el.textContent = body.classList.contains('open') ? '▼ 思考过程' : '▶ 思考过程';
  }
}

async function pickWorkspace() {
  try {
    var d = await window.showDirectoryPicker();
    document.getElementById('sWorkspace').value = d.name;
  } catch(e) {
    var p = prompt("输入工作目录路径:", document.getElementById('sWorkspace').value || ".");
    if(p) document.getElementById('sWorkspace').value = p;
  }
}

function newChat() {
  curSession = 's_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  document.getElementById('chatLog').innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);"><div style="font-size:40px;margin-bottom:12px;opacity:.3">...</div><div style="font-size:15px;font-weight:500;">开始新对话</div><div style="font-size:13px;margin-top:4px;">消息会自动保存</div></div>';
  document.getElementById('chatTitle').textContent = '新对话';
  document.querySelectorAll('.history-item').forEach(function(e){e.classList.remove('active');});
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Normal chat (with memory + tools)
async function sendMsg() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg || isLoading) return;
  input.value = '';
  var log = document.getElementById('chatLog');
  if (log.children.length===1 && log.children[0].querySelector('[style*="text-align:center"]')) log.innerHTML = '';
  log.insertAdjacentHTML('beforeend','<div class="msg user"><div class="msg-av">U</div><div class="msg-bub">'+esc(msg)+'</div></div>');
  log.scrollTop = log.scrollHeight;
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  var botDiv = document.createElement('div');
  botDiv.className = 'msg bot';
  botDiv.innerHTML = '<div class="msg-av">M</div><div class="msg-bub">思考中...</div>';
  log.appendChild(botDiv); log.scrollTop = log.scrollHeight;
  try {
    var d = await (await authFetch('/chat/memory',{method:'POST',body:JSON.stringify({message:msg,session_id:curSession,provider:curProvider})})).json();
    if (!botDiv.parentNode) return;
    if (d.response) {
      var html = '<div class="msg-av">M</div><div class="msg-bub">'+esc(d.response);
      if (d.reasoning) html += '<div class="rzn-toggle" onclick="toggleRzn(this)">&#9654; 思考过程</div><div class="rzn-body">'+esc(d.reasoning)+'</div>';
      if (d.usage || d.elapsed_ms) html += '<div class="msg-foot">'+(d.usage?'in:'+(d.usage.prompt_tokens||0)+' out:'+(d.usage.completion_tokens||0):'')+(d.elapsed_ms?' &middot; '+d.elapsed_ms+'ms':'')+'</div>';
      html += '</div>';
      botDiv.innerHTML = html;
      loadSessions();
    } else if (d.error) { botDiv.innerHTML = '<div class="msg-av">M</div><div class="msg-bub">错误: '+esc(d.error)+'</div>'; }
    localStorage.setItem('zhimo_session', curSession);
  } catch(e) { if(botDiv.parentNode) botDiv.innerHTML='<div class="msg-av">M</div><div class="msg-bub">请求失败</div>'; }
  isLoading = false; document.getElementById('sendBtn').disabled = false; log.scrollTop = log.scrollHeight;
}

// Streaming chat (real-time reasoning + content, no tools/memory)
async function delSession(id) {
  try { await authFetch('/chat/memory',{method:'POST',body:JSON.stringify({clear:true,session_id:id})}); if(curSession===id)newChat(); loadSessions(); } catch(e){}
}

async function loadSession(id) {
  curSession = id;
  document.getElementById('chatTitle').textContent = '对话';
  document.querySelectorAll('.history-item').forEach(function(e){e.classList.remove('active');});
  var log = document.getElementById('chatLog');
  log.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">加载中...</div>';
  try {
    var msgs = await (await fetch('/api/sessions/'+encodeURIComponent(id)+'/messages')).json();
    log.innerHTML = '';
    msgs.forEach(function(m){ var u=m.role==='user'; log.insertAdjacentHTML('beforeend','<div class="msg '+(u?'user':'bot')+'"><div class="msg-av">'+(u?'U':'M')+'</div><div class="msg-bub">'+esc(m.content)+'</div></div>'); });
    if (!msgs.length) log.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">空对话</div>';
  } catch(e) { log.innerHTML = '<div class="msg bot"><div class="msg-av">M</div><div class="msg-bub">无法加载历史</div></div>'; }
  log.scrollTop = log.scrollHeight;
  document.querySelectorAll('.history-item').forEach(function(e){if(e.textContent.indexOf(id.slice(0,8))>=0)e.classList.add('active');});
}

function filterHistory() {
  var q = document.getElementById('searchHist').value.toLowerCase();
  document.querySelectorAll('.history-item').forEach(function(e){e.style.display=e.textContent.toLowerCase().indexOf(q)>=0?'':'none';});
}

// Start: if token exists hide auth overlay and init
if (authToken) {
  document.getElementById('authOverlay').classList.remove('show');
  initApp();
  setInterval(loadSessions, 5000);
  setInterval(loadStats, 10000);
}
</script>

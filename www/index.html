<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muduo Server · Dashboard</title>
<style>
:root {
  --bg-primary: #0a0a0b;
  --bg-secondary: #141416;
  --bg-card: #1a1a1d;
  --bg-hover: #222226;
  --border: #2a2a2e;
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #6b6b76;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --sidebar-width: 220px;
  --radius: 10px;
  --transition: 200ms cubic-bezier(0.16,1,0.3,1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; transition: transform var(--transition); }
.sidebar-header { padding: 20px 20px 12px; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.sidebar-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
.sidebar-nav { flex: 1; padding: 8px 12px; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: var(--text-secondary); cursor: pointer; transition: all var(--transition); font-size: 14px; margin-bottom: 1px; }
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }
.nav-item svg { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.6; }
.nav-item.active svg { opacity: 1; }
.nav-item .badge { margin-left: auto; background: var(--accent); color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
.server-status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; color: var(--text-muted); }
.server-status .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.online { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }

/* Main */
.main { flex: 1; overflow-y: auto; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-primary); z-index: 10; }
.topbar h2 { font-size: 17px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-muted); }
.mobile-toggle { display: none; background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 4px; }

/* Pages */
.page { display: none; padding: 28px 32px; max-width: 1200px; }
.page.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; transition: border-color var(--transition); }
.card:hover { border-color: #333; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.card .value { font-size: 26px; font-weight: 600; letter-spacing: -.02em; }
.card .change { font-size: 12px; margin-top: 4px; }
.card .change.up { color: var(--green); }
.card .change.down { color: var(--text-muted); }

/* Chart bars */
.chart-area { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
.chart-area .title { font-size: 14px; font-weight: 500; margin-bottom: 16px; }
.chart-bars { display: flex; align-items: flex-end; justify-content: space-around; gap: 6px; height: 160px; }
.bar { width: 100%; border-radius: 3px 3px 0 0; background: linear-gradient(to top, var(--accent), rgba(59,130,246,0.3)); min-height: 4px; transition: height .4s ease; }

/* Chat */
.chat-area { display: flex; flex-direction: column; height: calc(100vh - 140px); }
.chat-msgs { flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 78%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-av { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.msg.bot .msg-av { background: var(--accent-glow); color: var(--accent); }
.msg.user .msg-av { background: #27272a; color: var(--text-primary); }
.msg-bub { padding: 11px 15px; border-radius: 11px; font-size: 14px; line-height: 1.6; background: var(--bg-card); border: 1px solid var(--border); }
.msg.user .msg-bub { background: var(--accent); border-color: var(--accent); color: #fff; }
.chat-in { display: flex; gap: 8px; padding: 14px 0; border-top: 1px solid var(--border); margin-top: auto; }
.chat-in input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 9px; padding: 11px 15px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color var(--transition); }
.chat-in input:focus { border-color: var(--accent); }
.chat-in button { background: var(--accent); color: #fff; border: none; border-radius: 9px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity var(--transition); }
.chat-in button:hover { opacity: .85; }
.chat-in button svg { width: 17px; height: 17px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--bg-hover); }
.tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 9px; border-radius: 5px; font-weight: 500; }
.tag .d { width: 5px; height: 5px; border-radius: 50%; }
.tag.green { background: rgba(34,197,94,0.1); color: var(--green); }
.tag.green .d { background: var(--green); }
.tag.orange { background: rgba(245,158,11,0.1); color: var(--orange); }
.tag.orange .d { background: var(--orange); }
.tag.red { background: rgba(239,68,68,0.1); color: var(--red); }
.tag.red .d { background: var(--red); }
.tag.blue { background: rgba(59,130,246,0.1); color: var(--accent); }
.tag.blue .d { background: var(--accent); }

/* Section */
.sec-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.sec-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 7px 15px; border-radius: 7px; font-size: 12px; cursor: pointer; transition: all var(--transition); }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-pri { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-pri:hover { opacity: .85; background: var(--accent); color: #fff; }

/* Knowledge */
.doc-item { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 7px; transition: all var(--transition); cursor: pointer; }
.doc-item:hover { border-color: #333; background: var(--bg-hover); }
.doc-ic { width: 34px; height: 34px; border-radius: 7px; background: var(--accent-glow); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.doc-ic svg { width: 16px; height: 16px; color: var(--accent); }
.doc-info { flex: 1; }
.doc-info .n { font-size: 13px; font-weight: 500; }
.doc-info .m { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

.upload-z { border: 2px dashed var(--border); border-radius: var(--radius); padding: 36px; text-align: center; cursor: pointer; transition: all var(--transition); margin-bottom: 22px; }
.upload-z:hover { border-color: var(--accent); background: var(--accent-glow); }
.upload-z .ic { font-size: 28px; opacity: .35; margin-bottom: 6px; }
.upload-z p { color: var(--text-muted); font-size: 13px; }

/* MCP Tools */
.tool-g { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 11px; margin-bottom: 22px; }
.tool-c { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all var(--transition); }
.tool-c:hover { border-color: var(--accent); background: var(--bg-hover); }
.tool-c .ic { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-glow); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.tool-c .ic svg { width: 18px; height: 18px; color: var(--accent); }
.tool-c .n { font-size: 14px; font-weight: 500; }
.tool-c .d { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .mobile-toggle { display: block; }
  .topbar { padding: 12px 16px; }
  .page { padding: 16px; }
  .card-grid { grid-template-columns: 1fr; }
  .tool-g { grid-template-columns: 1fr; }
}
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; }
.overlay.show { display: block; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="tSide()"></div>

<nav class="sidebar" id="side">
  <div class="sidebar-header"><div class="sidebar-logo"><div class="dot"></div><span>Muduo</span></div></div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-p="dashboard" onclick="go('dashboard',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>仪表盘</div>
    <div class="nav-item" data-p="chat" onclick="go('chat',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>AI 对话</div>
    <div class="nav-item" data-p="knowledge" onclick="go('knowledge',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>知识库 <span class="badge">12</span></div>
    <div class="nav-item" data-p="mcp" onclick="go('mcp',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>MCP 工具</div>
    <div class="nav-item" data-p="router" onclick="go('router',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M20 12a8 8 0 10-16 0 8 8 0 0016 0z"/></svg>路由状态</div>
  </div>
  <div class="sidebar-footer"><div class="server-status"><div class="dot online"></div><span>运行中 · 8080</span></div></div>
</nav>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;"><button class="mobile-toggle" onclick="tSide()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2 id="pt">仪表盘</h2></div>
    <div class="topbar-right"><span>v0.1.0</span></div>
  </div>

  <!-- Dashboard -->
  <div class="page active" id="p-dashboard">
    <div class="card-grid">
      <div class="card"><div class="label">在线时间</div><div class="value" id="vu">--</div><div class="change up">自启动</div></div>
      <div class="card"><div class="label">总请求数</div><div class="value" id="vr">--</div><div class="change up">+12% 较昨日</div></div>
      <div class="card"><div class="label">活跃连接</div><div class="value" id="vc">--</div><div class="change up">当前</div></div>
      <div class="card"><div class="label">平均响应</div><div class="value" id="va">--</div><div class="change down">较上周持平</div></div>
    </div>
    <div class="chart-area"><div class="title">近 24 小时请求量</div><div class="chart-bars" id="chart"></div></div>
  </div>

  <!-- Chat -->
  <div class="page" id="p-chat">
    <div class="chat-area">
      <div class="chat-msgs" id="clog"><div class="msg bot"><div class="msg-av">M</div><div class="msg-bub">你好！我是 AI Agent，可以帮你读文件、查系统信息、调用工具。有什么需要？</div></div></div>
      <div class="chat-in"><input id="ci" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sChat()"><button onclick="sChat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button></div>
    </div>
  </div>

  <!-- Knowledge -->
  <div class="page" id="p-knowledge">
    <div class="upload-z" onclick="document.getElementById('fi').click()"><div class="ic">📄</div><p>点击上传文档</p><input type="file" id="fi" multiple style="display:none" onchange="upDocs(this.files)"></div>
    <div class="sec-row"><span class="sec-title">文档列表</span><span style="font-size:12px;color:var(--text-muted)">共 <span id="dc">12</span> 项</span></div>
    <div id="dl"></div>
  </div>

  <!-- MCP -->
  <div class="page" id="p-mcp">
    <div class="sec-row"><span class="sec-title">可用工具</span><button class="btn" onclick="refTools()">刷新</button></div>
    <div class="tool-g" id="tg"></div>
    <div class="sec-title" style="margin-top:22px">调用日志</div>
    <table><thead><tr><th>时间</th><th>工具</th><th>结果</th><th>状态</th></tr></thead><tbody id="tl"></tbody></table>
  </div>

  <!-- Router -->
  <div class="page" id="p-router">
    <div class="sec-row"><span class="sec-title">提供商状态</span><button class="btn btn-pri" onclick="refRouter()">刷新</button></div>
    <table><thead><tr><th>名称</th><th>模型</th><th>熔断状态</th><th>启用</th></tr></thead><tbody id="rt"></tbody></table>
  </div>
</div>

<script>
const _d = { uptime: '3h 42m', requests: '128.4k', connections: '7', avgResp: '42ms' };
const _docs = [
  { n: '项目架构设计.md', s: '24 KB', d: '2026-06-21' },
  { n: 'API 接口文档.md', s: '56 KB', d: '2026-06-20' },
  { n: '数据库设计.md', s: '18 KB', d: '2026-06-20' },
  { n: '部署指南.md', s: '12 KB', d: '2026-06-19' },
  { n: 'MCP 协议实现.md', s: '32 KB', d: '2026-06-18' },
];
const _tools = [
  { n: 'read_file', d: '读取文件内容', p: 'path' },
  { n: 'write_file', d: '写入文件', p: 'path, content' },
  { n: 'echo', d: '回显消息', p: 'message' },
  { n: 'system_info', d: '获取系统信息', p: '—' },
  { n: 'list_directory', d: '列出目录', p: 'path' },
];
const _router = [
  { n: 'OpenAI', m: 'gpt-4o', s: 'closed', e: true },
  { n: 'Claude', m: 'claude-3-5-sonnet', s: 'closed', e: false },
];
const _tlog = [
  { t: '14:32:18', n: 'read_file', r: 'README.md', s: '成功' },
  { t: '14:31:02', n: 'list_directory', r: '/home', s: '成功' },
];

function go(n, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('p-'+n).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('pt').textContent = el ? el.textContent.trim().replace(/\d+/g,'') : n;
  if (window.innerWidth<=768) tSide();
}
function tSide() { document.getElementById('side').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }

// Dashboard
function initDash() {
  document.getElementById('vu').textContent = _d.uptime;
  document.getElementById('vr').textContent = _d.requests;
  document.getElementById('vc').textContent = _d.connections;
  document.getElementById('va').textContent = _d.avgResp;
  const c = document.getElementById('chart');
  const h = [30,55,45,70,60,85,75,92,80,65,50,40,60,78,88,95,72,58,44,66,82,74,52,35];
  h.forEach(v => { const b = document.createElement('div'); b.className='bar'; b.style.height=v+'%'; c.appendChild(b); });
}

// Chat
async function sChat() {
  const i = document.getElementById('ci'), msg = i.value.trim(); if(!msg) return; i.value='';
  const log = document.getElementById('clog');
  log.innerHTML += '<div class="msg user"><div class="msg-av">U</div><div class="msg-bub">'+esc(msg)+'</div></div>';
  log.scrollTop = log.scrollHeight;
  log.innerHTML += '<div class="msg bot"><div class="msg-av">M</div><div class="msg-bub" id="tb">思考中...</div></div>';
  try {
    const r = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d = await r.json();
    document.getElementById('tb').textContent = d.response||'(无响应)';
  } catch(e) {
    const rs = ['好的，我来处理。','已读取文件内容。','完成操作。','已调用工具获取结果。'];
    document.getElementById('tb').textContent = rs[Math.floor(Math.random()*rs.length)]+'（演示模式）';
  }
  log.scrollTop = log.scrollHeight;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Knowledge
function initKnow() {
  const l = document.getElementById('dl'); l.innerHTML = '';
  _docs.forEach(d => {
    l.innerHTML += '<div class="doc-item"><div class="doc-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="doc-info"><div class="n">'+d.n+'</div><div class="m">'+d.s+' · '+d.d+'</div></div></div>';
  });
}
async function upDocs(fs) {
  if(!fs.length) return;
  for(const f of fs) {
    const t = await f.text();
    try { await fetch('/rag/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,source:f.name})}); } catch(e){}
  }
  alert('已上传 '+fs.length+' 个文档（演示）');
}

// MCP
function initMCP() {
  const g = document.getElementById('tg'); g.innerHTML = '';
  _tools.forEach(t => {
    g.innerHTML += '<div class="tool-c" onclick="cTool(\''+t.n+'\')"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg></div><div class="n">'+t.n+'</div><div class="d">'+t.d+' · '+t.p+'</div></div>';
  });
  const l = document.getElementById('tl'); l.innerHTML = '';
  _tlog.forEach(t => {
    l.innerHTML += '<tr><td style="color:var(--text-muted)">'+t.t+'</td><td>'+t.n+'</td><td style="color:var(--text-muted)">'+t.r+'</td><td><span class="tag green"><span class="d"></span>'+t.s+'</span></td></tr>';
  });
}
async function cTool(n) {
  const l = document.getElementById('tl');
  const now = new Date().toTimeString().slice(0,8);
  l.innerHTML = '<tr><td style="color:var(--text-muted)">'+now+'</td><td>'+n+'</td><td style="color:var(--text-muted)">运行中</td><td><span class="tag blue"><span class="d"></span>调用中</span></td></tr>' + l.innerHTML;
  try { await fetch('/mcp/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:''+Date.now(),method:'tools/call',params:{name:n,arguments:{}}})}); } catch(e){}
  setTimeout(() => { if(l.firstChild) l.firstChild.innerHTML = '<td style="color:var(--text-muted)">'+now+'</td><td>'+n+'</td><td style="color:var(--text-muted)">完成</td><td><span class="tag green"><span class="d"></span>成功</span></td>'; }, 600);
}
async function refTools() {
  try {
    const r = await fetch('/mcp/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:'ls',method:'tools/list',params:{}})});
    const d = await r.json();
    if(d.result&&d.result.tools) {
      const g = document.getElementById('tg'); g.innerHTML = '';
      d.result.tools.forEach(t => {
        const p = t.inputSchema?.required?.join(', ')||'—';
        g.innerHTML += '<div class="tool-c" onclick="cTool(\''+t.name+'\')"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg></div><div class="n">'+t.name+'</div><div class="d">'+(t.description||'')+' · '+p+'</div></div>';
      });
      return;
    }
  } catch(e){}
  initMCP();
}

// Router
function initRouter() {
  const t = document.getElementById('rt'); t.innerHTML = '';
  _router.forEach(r => {
    const sc = r.s==='closed'?'green':r.s==='open'?'red':'orange';
    t.innerHTML += '<tr><td><strong>'+r.n+'</strong></td><td style="color:var(--text-muted)">'+r.m+'</td><td><span class="tag '+sc+'"><span class="d"></span>'+r.s+'</span></td><td>'+(r.e?'<span class="tag green"><span class="d"></span>启用</span>':'<span class="tag orange"><span class="d"></span>停用</span>')+'</td></tr>';
  });
}
async function refRouter() {
  try {
    const r = await fetch('/router/status'); const d = await r.json();
    const t = document.getElementById('rt'); t.innerHTML = '';
    d.forEach(r => {
      const sc = r.state==='closed'?'green':r.state==='open'?'red':'orange';
      t.innerHTML += '<tr><td><strong>'+(r.name||'—')+'</strong></td><td style="color:var(--text-muted)">'+(r.model||'—')+'</td><td><span class="tag '+sc+'"><span class="d"></span>'+r.state+'</span></td><td>'+(r.enabled?'<span class="tag green"><span class="d"></span>启用</span>':'<span class="tag orange"><span class="d"></span>停用</span>')+'</td></tr>';
    });
  } catch(e){ initRouter(); }
}

initDash(); initKnow(); initMCP(); initRouter();
</script>

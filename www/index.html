<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知墨 · 对话</title>
<style>
:root {
  --bg: #f7f8fa;
  --bg-side: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #f0f2f6;
  --bg-active: #eef0ff;
  --border: #e4e7ee;
  --text: #1a1d2e;
  --text-soft: #5a6075;
  --text-muted: #949ab0;
  --accent: #6366f1;
  --accent-light: #eef0ff;
  --shadow: 0 1px 3px rgba(0,0,0,.04);
  --radius: 10px;
  --radius-sm: 7px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
.sidebar { width: 260px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-head { padding: 16px 16px 12px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-head h1 { font-size: 15px; font-weight: 700; }
.sidebar-head button { background: var(--accent); border: none; color: #fff; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.sidebar-head button:hover { opacity: .85; }
.sidebar-search { padding: 0 12px 8px; }
.sidebar-search input { width: 100%; background: var(--bg); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 7px 10px; font-size: 12px; color: var(--text); outline: none; }
.sidebar-search input:focus { border-color: var(--accent); background: #fff; }
.history-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.history-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text-soft); transition: all .15s; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
.history-item:hover { background: var(--bg-hover); }
.history-item.active { background: var(--bg-active); color: var(--accent); font-weight: 500; }
.history-item .del { margin-left: auto; opacity: 0; width: 20px; height: 20px; border: none; background: none; color: var(--text-muted); cursor: pointer; border-radius: 4px; font-size: 13px; display: flex; align-items: center; justify-content: center; }
.history-item:hover .del { opacity: 1; }
.history-item .del:hover { background: var(--bg-hover); color: #ef4444; }
.history-item .preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.sidebar-foot { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-foot .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.sidebar-foot .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
.sidebar-foot .setting-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; }
.sidebar-foot .setting-btn:hover { background: var(--bg-hover); color: var(--text); }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(247,248,250,.85); backdrop-filter: blur(10px); }
.chat-header .title { font-size: 14px; font-weight: 600; }
.chat-header .model-badge { font-size: 11px; background: var(--accent-light); color: var(--accent); padding: 3px 10px; border-radius: 6px; font-weight: 500; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 10px; max-width: 85%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-av { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.msg.bot .msg-av { background: var(--accent-light); color: var(--accent); }
.msg.user .msg-av { background: var(--accent); color: #fff; }
.msg-bub { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.bot .msg-bub { background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow); }
.msg.user .msg-bub { background: var(--accent); color: #fff; }
.chat-in { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); }
.chat-in .row { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; }
.chat-in input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 16px; font-size: 14px; color: var(--text); outline: none; box-shadow: var(--shadow); }
.chat-in input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.chat-in button { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.chat-in button svg { width: 18px; height: 18px; }
.chat-in .hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 440px; max-width: 90vw; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.12); }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.modal .field { margin-bottom: 16px; }
.modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; color: var(--text); outline: none; }
.modal input:focus { border-color: var(--accent); }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal .actions button { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.modal .actions .pri { background: var(--accent); color: #fff; }
.modal .actions .pri:hover { opacity: .85; }
.modal .actions .sec { background: var(--bg); color: var(--text-soft); border: 1px solid var(--border); }
.modal .actions .sec:hover { background: var(--bg-hover); }
.modal .tip { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #d0d5e0; border-radius: 2px; }
</style>
</head>
<body>

<aside class="sidebar" id="side">
  <div class="sidebar-head">
    <h1>知墨</h1>
    <button onclick="newChat()" title="新对话">+</button>
  </div>
  <div class="sidebar-search"><input id="searchHist" placeholder="搜索对话..." oninput="filterHistory()"></div>
  <div class="history-list" id="histList">
    <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无历史对话</div>
  </div>
  <div class="sidebar-foot">
    <div class="status"><div class="dot"></div><span id="connStatus">已连接</span></div>
    <button class="setting-btn" onclick="openSettings()" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</aside>

<div class="main">
  <div class="chat-header">
    <span class="title" id="chatTitle">新对话</span>
    <span class="model-badge" id="modelBadge">gpt-3.5-turbo</span>
  </div>
  <div class="chat-msgs" id="chatLog">
    <div style="text-align:center;padding:40px 20px;color:var(--text-muted);">
      <div style="font-size:40px;margin-bottom:12px;opacity:.3">...</div>
      <div style="font-size:15px;font-weight:500;">开始新对话</div>
      <div style="font-size:13px;margin-top:4px;">消息会自动保存，下次可以继续</div>
    </div>
  </div>
  <div class="chat-in">
    <div class="row">
      <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
      <button id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint" id="keyHint">未配置 API Key</div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>设置</h2>
    <div class="field">
      <label>API Key</label>
      <input id="sApiKey" type="password" placeholder="sk-..." onchange="saveSettings()">
    </div>
    <div class="field">
      <label>模型</label>
      <input id="sModel" placeholder="gpt-3.5-turbo" onchange="saveSettings()">
    </div>
    <div class="field">
      <label>API 地址</label>
      <input id="sApiBase" placeholder="https://api.openai.com/v1" onchange="saveSettings()">
    </div>
    <div class="actions">
      <button class="sec" onclick="closeSettings()">取消</button>
      <button class="pri" onclick="saveSettings()">保存</button>
    </div>
    <div class="tip">设置保存在 server.conf 中</div>
  </div>
</div>

<script>
let curSession = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
let isLoading = false;

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    document.getElementById('sApiKey').value = d.api_key || '';
    document.getElementById('sModel').value = d.model || 'gpt-3.5-turbo';
    document.getElementById('sApiBase').value = d.api_base || '';
    document.getElementById('modelBadge').textContent = d.model || '?';
    document.getElementById('keyHint').textContent = d.api_key ? '已配置' : '未配置 API Key';
  } catch(e) {}
}

async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    const list = await r.json();
    const el = document.getElementById('histList');
    if (!list.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">暂无历史对话</div>';
      return;
    }
    el.innerHTML = '';
    list.forEach(s => {
      const d = document.createElement('div');
      d.className = 'history-item' + (curSession === s.id ? ' active' : '');
      d.innerHTML = '<span class="preview">' + esc(s.preview || s.id.slice(0,12)) + '</span><button class="del" onclick="event.stopPropagation();delSession(\''+s.id+'\')">x</button>';
      d.onclick = () => loadSession(s.id);
      el.appendChild(d);
    });
  } catch(e) {}
}

async function saveSettings() {
  const key = document.getElementById('sApiKey').value;
  const model = document.getElementById('sModel').value;
  const base = document.getElementById('sApiBase').value;
  try {
    await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({api_key: key, model: model, api_base: base})
    });
    document.getElementById('modelBadge').textContent = model || '?';
    document.getElementById('keyHint').textContent = key ? '已配置' : '未配置 API Key';
    loadConfig();
    closeSettings();
  } catch(e) { alert('保存失败: '+e.message); }
}

function openSettings() { document.getElementById('settingsModal').classList.add('show'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

function newChat() {
  curSession = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  document.getElementById('chatLog').innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);"><div style="font-size:40px;margin-bottom:12px;opacity:.3">...</div><div style="font-size:15px;font-weight:500;">开始新对话</div><div style="font-size:13px;margin-top:4px;">消息会自动保存，下次可以继续</div></div>';
  document.getElementById('chatTitle').textContent = '新对话';
  document.querySelectorAll('.history-item').forEach(e => e.classList.remove('active'));
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || isLoading) return;
  input.value = '';

  const log = document.getElementById('chatLog');
  if (log.children.length === 1 && log.children[0].querySelector('[style*="text-align:center"]')) {
    log.innerHTML = '';
  }

  log.insertAdjacentHTML('beforeend', '<div class="msg user"><div class="msg-av">U</div><div class="msg-bub">'+esc(msg)+'</div></div>');
  log.scrollTop = log.scrollHeight;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const botDiv = document.createElement('div');
  botDiv.className = 'msg bot';
  botDiv.innerHTML = '<div class="msg-av">M</div><div class="msg-bub">思考中...</div>';
  log.appendChild(botDiv);
  log.scrollTop = log.scrollHeight;

  try {
    const r = await fetch('/chat/memory', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, session_id: curSession})
    });
    const d = await r.json();
    const botBubbles = log.querySelectorAll('.msg.bot .msg-bub');
    const tb = botBubbles[botBubbles.length - 1];
    if (d.response) {
      tb.textContent = d.response;
      loadSessions();
    } else if (d.error) {
      tb.textContent = '错误: ' + d.error;
    }
  } catch(e) {
    const botBubbles = log.querySelectorAll('.msg.bot .msg-bub');
    const tb = botBubbles[botBubbles.length - 1];
    if (tb) tb.textContent = '请求失败: ' + e.message;
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  log.scrollTop = log.scrollHeight;
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function delSession(id) {
  try {
    await fetch('/chat/memory', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clear:true, session_id: id})});
    if (curSession === id) newChat();
    loadSessions();
  } catch(e) {}
}

async function loadSession(id) {
  curSession = id;
  document.getElementById('chatTitle').textContent = '对话';
  document.querySelectorAll('.history-item').forEach(e => e.classList.remove('active'));
  const log = document.getElementById('chatLog');
  log.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">加载中...</div>';
  try {
    const r = await fetch('/api/sessions/' + encodeURIComponent(id) + '/messages');
    if (!r.ok) throw Error('not found');
    const msgs = await r.json();
    log.innerHTML = '';
    msgs.forEach(m => {
      const isUser = m.role === 'user';
      log.insertAdjacentHTML('beforeend',
        '<div class="msg ' + (isUser ? 'user' : 'bot') + '">' +
        '<div class="msg-av">' + (isUser ? 'U' : 'M') + '</div>' +
        '<div class="msg-bub">' + esc(m.content) + '</div></div>');
    });
    if (!msgs.length) {
      log.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">空对话</div>';
    }
  } catch(e) {
    log.innerHTML = '<div class="msg bot"><div class="msg-av">M</div><div class="msg-bub">无法加载历史</div></div>';
  }
  log.scrollTop = log.scrollHeight;
  document.querySelectorAll('.history-item').forEach(e => {
    if (e.textContent.includes(id.slice(0,8))) e.classList.add('active');
  });
}

function filterHistory() {
  const q = document.getElementById('searchHist').value.toLowerCase();
  document.querySelectorAll('.history-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

loadConfig();
loadSessions();
setInterval(loadSessions, 5000);
</script>
</body>
</html>

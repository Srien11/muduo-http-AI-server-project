<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
.header { background: #2563eb; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; }
.header button { background: rgba(255,255,255,0.2); color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.chat-area { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
.msg { margin-bottom: 16px; display: flex; }
.msg.user { justify-content: flex-end; }
.msg.bot { justify-content: flex-start; }
.bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.msg.user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.msg.tool-call .bubble { background: #fef3c7; color: #92400e; font-size: 12px; border-radius: 4px; max-width: 90%; margin: 4px auto; text-align: center; }
.input-area { border-top: 1px solid #ddd; background: white; padding: 16px; max-width: 800px; margin: 0 auto; width: 100%; display: flex; gap: 12px; }
.input-area input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #2563eb; }
.input-area button { background: #2563eb; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { text-align: center; color: #999; padding: 8px; font-size: 13px; }
.api-key-bar { background: #fffbeb; padding: 8px 24px; text-align: center; font-size: 13px; color: #92400e; display: flex; align-items: center; justify-content: center; gap: 8px; }
.api-key-bar input { width: 300px; padding: 4px 8px; border: 1px solid #fde68a; border-radius: 4px; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
<h1>AI Agent</h1>
<button onclick="clearChat()">清空对话</button>
</div>

<div class="api-key-bar" id="key-bar">
API Key:
<input type="password" id="api-key-input" placeholder="sk-..." onchange="setApiKey()">
<button onclick="setApiKey()" style="margin-left:8px;padding:2px 8px;font-size:12px;background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;">保存</button>
</div>

<div class="chat-area" id="chat-area">
<div class="msg bot">
<div class="bubble">你好！我是 AI Agent，可以调用工具来帮你完成任务。<br><br>例如：<br>• "帮我列出 /home 目录下的文件"<br>• "读一下 README.md 的内容"<br>• "查看系统信息"</div>
</div>
</div>

<div class="input-area">
<input id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter') send()">
<button id="send-btn" onclick="send()">发送</button>
</div>

<script>
let loading = false;

function addMessage(text, role) {
    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function addToolCall(text) {
    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'msg tool-call';
    div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
    const input = document.getElementById('input');
    const msg = input.value.trim();
    if (!msg || loading) return;

    input.value = '';
    addMessage(msg, 'user');
    loading = true;
    document.getElementById('send-btn').disabled = true;

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        if (data.response) {
            addMessage(data.response, 'bot');
        } else if (data.error) {
            addMessage('Error: ' + data.error, 'bot');
        }
    } catch (e) {
        addMessage('Connection error: ' + e.message, 'bot');
    }

    loading = false;
    document.getElementById('send-btn').disabled = false;
}

async function clearChat() {
    await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clear: true })
    });
    const area = document.getElementById('chat-area');
    area.innerHTML = '<div class="msg bot"><div class="bubble">对话已清空。</div></div>';
}

async function setApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) return;
    try {
        await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: key })
        });
        document.getElementById('key-bar').style.display = 'none';
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

async function loadConfig() {
    try {
        const d = await (await fetch('/api/config')).json();
        if (d.api_key) {
            document.getElementById('key-bar').style.display = 'none';
        }
    } catch(e) {}
}

loadConfig();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>File Upload</title>
<style>
body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
h1 { color: #2563eb; }
form { border: 2px dashed #ccc; padding: 20px; border-radius: 8px; }
input[type=file] { margin: 10px 0; }
button { background: #2563eb; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; }
pre { background: #f5f5f5; padding: 12px; border-radius: 6px; margin-top: 20px; }
</style>
</head>
<body>
<h1>File Upload Demo</h1>
<form action="/upload" method="post" enctype="multipart/form-data">
<label>Text field: <input type="text" name="note" value="test"></label><br><br>
<label>Select file: <input type="file" name="file"></label><br><br>
<button type="submit">Upload</button>
</form>
<pre id="result"></pre>
<script>
document.querySelector('form').onsubmit = async (e) => {
e.preventDefault();
const form = e.target;
const res = await fetch(form.action, { method: 'POST', body: new FormData(form) });
document.getElementById('result').textContent = await res.text();
};
</script>
</body>
</html>
